<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مساعد تعليمات الشركة</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a18; padding: 1.5rem; }
  .app { display: flex; flex-direction: column; min-height: 600px; max-width: 780px; margin: 0 auto; }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .tab { padding: 8px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; cursor: pointer; font-size: 14px; color: #666; font-family: inherit; transition: all 0.15s; }
  .tab.active { background: #eee; color: #111; border-color: #aaa; font-weight: 500; }
  .panel { display: none; }
  .panel.active { display: flex; flex-direction: column; gap: 1rem; }
  .card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 1rem 1.25rem; }
  textarea { width: 100%; border: 0.5px solid #e0e0d8; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; background: #fff; color: #1a1a18; }
  textarea:focus { outline: none; border-color: #aaa; }
  .btn { padding: 9px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; cursor: pointer; font-size: 14px; font-family: inherit; color: #1a1a18; transition: all 0.15s; }
  .btn:hover { background: #f0f0ec; }
  .btn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn.primary:hover { opacity: 0.85; }
  .upload-area { border: 1px dashed #ccc; border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; color: #888; font-size: 14px; transition: background 0.15s; }
  .upload-area:hover { background: #f5f5f0; }
  .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .file-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #f5f5f0; border-radius: 8px; font-size: 13px; }
  .file-item .remove { cursor: pointer; color: #aaa; font-size: 16px; padding: 0 4px; }
  .file-item .remove:hover { color: #c0392b; }
  .status-bar { padding: 10px 14px; border-radius: 8px; font-size: 13px; }
  .status-bar.success { background: #eaf3de; color: #3b6d11; }
  .status-bar.info { background: #e6f1fb; color: #185fa5; }
  .status-bar.error { background: #fcebeb; color: #a32d2d; }
  .chat-messages { display: flex; flex-direction: column; gap: 12px; min-height: 300px; max-height: 400px; overflow-y: auto; padding: 4px 0; }
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.bot .msg-bubble { background: #f0f0ec; color: #1a1a18; border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: #1a1a18; color: #fff; border-bottom-right-radius: 4px; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .bot-avatar { background: #e6f1fb; color: #185fa5; }
  .user-avatar { background: #f0f0ec; color: #666; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input { flex: 1; padding: 9px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; color: #1a1a18; }
  .chat-input-row input:focus { outline: none; border-color: #aaa; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 12px; }
  .badge.on { background: #eaf3de; color: #3b6d11; }
  .badge.off { background: #f0f0ec; color: #888; }
  .lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; gap: 1rem; }
  .lock-screen input { padding: 10px 14px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 15px; font-family: inherit; width: 240px; text-align: center; letter-spacing: 2px; background: #fff; color: #1a1a18; }
  .lock-screen input:focus { outline: none; border-color: #aaa; }
  .lock-error { font-size: 13px; color: #c0392b; min-height: 18px; }
  input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('admin',event)">لوحة المدير</button>
    <button class="tab" onclick="switchTab('employee',event)">واجهة الموظف</button>
  </div>

  <div id="panel-admin" class="panel active">
    <div id="lock-screen" class="card lock-screen">
      <div style="font-size:36px;">🔒</div>
      <div style="font-size:15px;font-weight:500;">لوحة المدير محمية</div>
      <div style="font-size:13px;color:#888;">أدخل الباسوورد للمتابعة</div>
      <input type="password" id="admin-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()" />
      <button class="btn primary" onclick="checkPassword()">دخول</button>
      <div class="lock-error" id="lock-error"></div>
    </div>

    <div id="admin-content" style="display:none;flex-direction:column;gap:1rem;">
      <div class="card">
        <div style="font-size:15px;font-weight:500;margin-bottom:4px;">التعليمات النصية</div>
        <div style="font-size:12px;color:#aaa;margin-bottom:10px;">اكتب هنا أي تعليمات أو سياسات</div>
        <textarea id="instructions-text" rows="7" placeholder="مثال: ساعات العمل من 9 صباحًا حتى 5 مساءً..."></textarea>
      </div>

      <div class="card">
        <div style="font-size:15px;font-weight:500;margin-bottom:4px;">رفع ملفات PDF</div>
        <div style="font-size:12px;color:#aaa;margin-bottom:10px;">ارفع ملفات PDF تحتوي على التعليمات</div>
        <div class="upload-area" onclick="document.getElementById('pdf-input').click()">
          اضغط هنا لرفع ملف PDF
          <div style="font-size:12px;margin-top:4px;color:#aaa;">يمكن رفع أكثر من ملف</div>
        </div>
        <input type="file" id="pdf-input" accept="application/pdf" multiple onchange="handlePDFUpload(event)" />
        <div class="file-list" id="file-list"></div>
      </div>

      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn primary" onclick="saveInstructions()">حفظ التعليمات</button>
        <button class="btn" onclick="clearAll()" style="color:#888;">مسح الكل</button>
        <button class="btn" onclick="lockAdmin()" style="color:#888;margin-right:auto;">قفل اللوحة 🔒</button>
      </div>
      <div id="admin-status"></div>
    </div>
  </div>

  <div id="panel-employee" class="panel">
    <div class="card" style="padding:0.75rem 1.25rem;display:flex;align-items:center;gap:8px;">
      <span style="font-size:13px;color:#888;">حالة التعليمات:</span>
      <span id="instructions-badge" class="badge off">لا توجد تعليمات</span>
    </div>
    <div class="card">
      <div class="chat-messages" id="chat-messages">
        <div class="msg bot">
          <div class="msg-avatar bot-avatar">م</div>
          <div class="msg-bubble">أهلاً! أنا مساعد الشركة. اسألني عن أي تعليمات أو سياسات.</div>
        </div>
      </div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="employee-question" placeholder="اكتب سؤالك هنا..." onkeydown="if(event.key==='Enter')sendQuestion()" />
      <button class="btn primary" onclick="sendQuestion()">إرسال</button>
    </div>
  </div>
</div>

<script>
let pdfFiles = [];
let pdfTexts = [];
let savedInstructions = '';
let chatHistory = [];

// تحميل التعليمات المحفوظة من السيرفر
async function loadInstructions() {
  try {
    const res = await fetch('/api/instructions');
    if (res.ok) {
      const data = await res.json();
      savedInstructions = data.instructions || '';
      pdfTexts = data.pdfTexts || [];
      if (savedInstructions) document.getElementById('instructions-text').value = savedInstructions;
      renderFileList();
      updateBadge();
    }
  } catch(e) {}
}

async function checkPassword() {
  const input = document.getElementById('admin-password');
  const error = document.getElementById('lock-error');
  try {
    const res = await fetch('/api/verify-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: input.value })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('admin-content').style.display = 'flex';
      error.textContent = '';
      input.value = '';
    } else {
      error.textContent = 'باسوورد غلط، حاول تاني';
      input.value = '';
      input.focus();
    }
  } catch(e) {
    error.textContent = 'حدث خطأ، حاول تاني';
  }
}

function lockAdmin() {
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('admin-content').style.display = 'none';
}

function switchTab(tab, event) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'employee') updateBadge();
}

function handlePDFUpload(event) {
  const files = Array.from(event.target.files);
  files.forEach(file => {
    if (!pdfFiles.find(f => f.name === file.name)) {
      pdfFiles.push(file);
      const reader = new FileReader();
      reader.onload = function(e) {
        pdfTexts.push({ name: file.name, base64: e.target.result.split(',')[1] });
        renderFileList();
      };
      reader.readAsDataURL(file);
    }
  });
  event.target.value = '';
}

function renderFileList() {
  document.getElementById('file-list').innerHTML = pdfTexts.map((f, i) => `
    <div class="file-item">
      <span>📄 ${f.name}</span>
      <span class="remove" onclick="removeFile(${i})">✕</span>
    </div>
  `).join('');
}

function removeFile(i) {
  pdfFiles.splice(i, 1);
  pdfTexts.splice(i, 1);
  renderFileList();
}

async function saveInstructions() {
  savedInstructions = document.getElementById('instructions-text').value.trim();
  const adminStatus = document.getElementById('admin-status');
  if (!savedInstructions && pdfTexts.length === 0) {
    adminStatus.innerHTML = '<div class="status-bar info">أضف نصًا أو ارفع ملف PDF أولاً</div>';
    return;
  }
  try {
    await fetch('/api/instructions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ instructions: savedInstructions, pdfTexts })
    });
    adminStatus.innerHTML = '<div class="status-bar success">تم الحفظ بنجاح</div>';
  } catch(e) {
    adminStatus.innerHTML = '<div class="status-bar error">حدث خطأ أثناء الحفظ</div>';
  }
  updateBadge();
}

async function clearAll() {
  document.getElementById('instructions-text').value = '';
  pdfFiles = []; pdfTexts = []; savedInstructions = '';
  renderFileList();
  document.getElementById('admin-status').innerHTML = '';
  await fetch('/api/instructions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ instructions: '', pdfTexts: [] })
  });
  updateBadge();
}

function updateBadge() {
  const badge = document.getElementById('instructions-badge');
  const hasData = savedInstructions || pdfTexts.length > 0;
  badge.className = 'badge ' + (hasData ? 'on' : 'off');
  badge.textContent = hasData
    ? (pdfTexts.length > 0 ? `نشطة — ${pdfTexts.length} ملف PDF + نص` : 'نشطة — نص')
    : 'لا توجد تعليمات';
}

function addMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const isBot = role === 'bot';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="msg-avatar ${isBot ? 'bot-avatar' : 'user-avatar'}">${isBot ? 'م' : 'أ'}</div>
    <div class="msg-bubble">${text}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar bot-avatar">م</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendQuestion() {
  const input = document.getElementById('employee-question');
  const q = input.value.trim();
  if (!q) return;
  if (!savedInstructions && pdfTexts.length === 0) {
    addMessage('bot', 'لم يتم تحميل أي تعليمات بعد. يرجى التواصل مع المسؤول.');
    return;
  }
  input.value = '';
  addMessage('user', q);
  chatHistory.push({ role: 'user', content: q });
  addTyping();

  const systemPrompt = `أنت مساعد ذكي لشركة. أجب على أسئلة الموظفين بناءً فقط على التعليمات التالية.
إذا لم تجد الإجابة، قل ذلك واطلب التواصل مع المسؤول. أجب دائمًا بالعربية.

التعليمات:
${savedInstructions}`;

  const messages = [];
  if (pdfTexts.length > 0) {
    const pdfContent = pdfTexts.map(p => ({
      type: 'document',
      source: { type: 'base64', media_type: 'application/pdf', data: p.base64 }
    }));
    pdfContent.push({ type: 'text', text: 'هذه ملفات التعليمات.' });
    messages.push({ role: 'user', content: pdfContent });
    messages.push({ role: 'assistant', content: 'استلمت ملفات التعليمات.' });
  }
  chatHistory.forEach(m => messages.push(m));

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, systemPrompt })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.map(c => c.text || '').join('\n') || 'حدث خطأ، حاول مرة أخرى.';
    addMessage('bot', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping();
    addMessage('bot', 'حدث خطأ في الاتصال.');
  }
}

loadInstructions();
</script>
</body>
</html>
