<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مساعد تعليمات الشركة</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    input, button, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background: #0070f3; color: white; cursor: pointer; border: none; }
    button:hover { background: #005bb5; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>مساعد تعليمات الشركة</h1>
    <div id="admin-login">
      <h2>🔒 لوحة المدير</h2>
      <p>أدخل الباسوورد للمتابعة</p>
      <input type="password" id="admin-pass" placeholder="كلمة المرور">
      <button onclick="verifyAdmin()">دخول</button>
    </div>

    <div id="admin-panel" class="hidden">
      <h2>لوحة التحكم</h2>
      <label>التعليمات النصية:</label>
      <textarea id="instructions-text" rows="5" placeholder="اكتب هنا أي تعليمات أو سياسات"></textarea>
      
      <label>رفع ملفات PDF:</label>
      <input type="file" id="pdf-upload" accept=".pdf" multiple>
      <p style="font-size:0.9em; color:#666;">يمكن رفع أكثر من ملف</p>
      
      <button onclick="saveData()">حفظ التعليمات</button>
      <button onclick="clearData()" style="background:#dc3545;">مسح الكل</button>
      <button onclick="logout()" style="background:#6c757d;">قفل اللوحة 🔒</button>
      
      <p>حالة التعليمات: <span id="status">لا توجد تعليمات</span></p>
    </div>

    <div id="employee-panel">
      <h2>واجهة الموظف</h2>
      <p>أهلاً! أنا مساعد الشركة. اسألني عن أي تعليمات أو سياسات.</p>
      <textarea id="user-question" rows="3" placeholder="اكتب سؤالك هنا..."></textarea>
      <button onclick="askBot()">إرسال</button>
      <div id="bot-response" style="margin-top:15px; padding:10px; background:#f9f9f9; border-radius:4px; min-height:40px;"></div>
    </div>
  </div>

  <script>
    // سكربت بسيط للتجربة (يمكنك تعديله لاحقاً)
    async function verifyAdmin() {
      const pass = document.getElementById('admin-pass').value;
      const res = await fetch('/api/verify-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
      } else {
        alert('كلمة المرور خاطئة');
      }
    }

    function logout() {
      document.getElementById('admin-panel').classList.add('hidden');
      document.getElementById('admin-login').classList.remove('hidden');
      document.getElementById('admin-pass').value = '';
    }

    async function saveData() {
      const instructions = document.getElementById('instructions-text').value;
      await fetch('/api/instructions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ instructions, pdfTexts: [] })
      });
      document.getElementById('status').textContent = '✅ تم الحفظ';
    }

    function clearData() {
      document.getElementById('instructions-text').value = '';
      document.getElementById('status').textContent = 'لا توجد تعليمات';
    }

    async function askBot() {
      const question = document.getElementById('user-question').value;
      const resDiv = document.getElementById('bot-response');
      resDiv.textContent = 'جاري التفكير...';
      
      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: question }],
            systemPrompt: 'أنت مساعد تعليمات الشركة. أجب بدقة بناءً على التعليمات المقدمة.'
          })
        });
        const data = await res.json();
        resDiv.textContent = data.content?.[0]?.text || 'حدث خطأ';
      } catch (e) {
        resDiv.textContent = 'خطأ في الاتصال بالخادم';
      }
    }
  </script>
</body>
</html>
